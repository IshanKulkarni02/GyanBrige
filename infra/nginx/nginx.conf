# Production nginx for a single college instance.
# TLS terminates here; websockets upgraded for realtime + livekit.

upstream api { server api:4000; }
upstream realtime { server realtime:4002; }
upstream transcription { server transcription:4001; }
upstream livekit { server livekit:7880; }

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/college.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/college.example/privkey.pem;

    client_max_body_size 600M;

    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location /transcription/ {
        proxy_pass http://transcription/;
        proxy_read_timeout 1800s;
    }

    location /socket.io/ {
        proxy_pass http://realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 7200s;
    }

    location /livekit {
        proxy_pass http://livekit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        root /var/www/gyanbrige;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}
