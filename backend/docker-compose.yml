version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: gyanbrige-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: gyanbrige
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - gyanbrige-network
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Replica Set Initialization
  mongodb-init:
    image: mongo:7.0
    container_name: gyanbrige-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - gyanbrige-network
    entrypoint: >
      bash -c '
        echo "Waiting for MongoDB to be ready..."
        sleep 5
        mongosh --host mongodb:27017 --eval "
          try {
            rs.initiate({
              _id: \"rs0\",
              members: [{ _id: 0, host: \"mongodb:27017\" }]
            })
            print(\"Replica set initiated\")
          } catch(e) {
            print(\"Replica set already initiated or error: \" + e)
          }
        "
        echo "MongoDB replica set initialized"
      '
    restart: "no"

  # Ollama with Llama 3
  ollama:
    image: ollama/ollama:latest
    container_name: gyanbrige-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - gyanbrige-network

  # Ollama Model Loader
  ollama-setup:
    image: ollama/ollama:latest
    container_name: gyanbrige-ollama-setup
    depends_on:
      - ollama
    networks:
      - gyanbrige-network
    entrypoint: >
      bash -c '
        echo "Pulling Llama 3 model..."
        ollama pull llama3 --host http://ollama:11434
        echo "Llama 3 model ready"
      '
    restart: "no"

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gyanbrige-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://mongodb:27017/gyanbrige?replicaSet=rs0
      - OLLAMA_API_URL=http://ollama:11434
      - JWT_SECRET=your_secret_key_change_this_in_production
      - VIDEO_UPLOAD_PATH=/app/uploads/videos
      - VIDEO_OUTPUT_PATH=/app/public/videos
      - HLS_SEGMENT_DURATION=10
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - ./public:/app/public
      - /app/node_modules
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
      ollama-setup:
        condition: service_completed_successfully
    networks:
      - gyanbrige-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ollama_data:
    driver: local

networks:
  gyanbrige-network:
    driver: bridge
